    <script>
        (function () {
            const timeDiff = Date.now() - 1776434808000;

            function updateBars() {
                const now = Date.now() - timeDiff;
                let elapsedSeconds = (now - 1776434808000) / 1000;

                let newLife = Math.min(Math.round(24 + 1.6666666666667 * elapsedSeconds), 100);
                let newMana = Math.min(Math.round(5 + 0.083333333333333 * elapsedSeconds), 5);

                const headerHP = document.querySelector('.hp-fill');
                const headerMana = document.querySelector('.mp-fill');
                if (headerHP && headerMana) {
                    headerHP.style.height = Math.round((newLife / 100) * 100) + '%';
                    headerMana.style.height = Math.round((newMana / 5) * 100) + '%';
                }
            }

            setInterval(updateBars, 250);
        })();
    </script>

        let lastGrid = initialGrid;

        function runInlineScripts(container) {
            if (!container) return;
            const scripts = Array.from(container.querySelectorAll('script'));
            for (const oldScript of scripts) {
                const s = document.createElement('script');
                for (const attr of oldScript.attributes) s.setAttribute(attr.name, attr.value);
                if (!oldScript.src) s.text = oldScript.textContent || '';
                oldScript.parentNode.replaceChild(s, oldScript);
            }
        }

        function runJsString(js) {
            if (!js) return;
            const s = document.createElement('script');
            s.text = js;
            document.body.appendChild(s);
            s.parentNode.removeChild(s);
        }

        function getCellSizePx() {
            const el = activeGrid.querySelector('.map-cell');
            if (!el) return 70;
            return Math.max(1, Math.round(el.getBoundingClientRect().width));
        }

        function baseOffsetPx() {
            const cellPx = getCellSizePx();
            // overscan +1
            return {x: -cellPx, y: -cellPx, cellPx};
        }

        function setStageBase(noTransition) {
            const b = baseOffsetPx();
            if (noTransition) stage.style.transition = 'none';
            stage.style.transform = `translate3d(${b.x}px, ${b.y}px, 0)`;
        }

        function computeDxDyByRooms(fromRoom, toRoom, rowCount) {
            const delta = toRoom - fromRoom;

            if (delta === 1) return {dx: 1, dy: 0};
            if (delta === -1) return {dx: -1, dy: 0};
            if (delta === rowCount) return {dx: 0, dy: 1};
            if (delta === -rowCount) return {dx: 0, dy: -1};

            if (delta === rowCount + 1) return {dx: 1, dy: 1};
            if (delta === rowCount - 1) return {dx: -1, dy: 1};
            if (delta === -rowCount + 1) return {dx: 1, dy: -1};
            if (delta === -rowCount - 1) return {dx: -1, dy: -1};

            return {dx: 0, dy: 0};
        }

        let pendingDir = null;
        let lastHardHref = '';

        function sign01(v) {
            return v < 0 ? -1 : (v > 0 ? 1 : 0);
        }

        function getOverscanCenter() {
            return {
                cx: Math.floor(current.cols / 2),
                cy: Math.floor(current.rows / 2)
            };
        }

        function dirFromClickedCell(cellEl) {
            if (!cellEl) return null;

            const cells = Array.from(activeGrid.querySelectorAll('.map-cell'));
            const idx = cells.indexOf(cellEl);
            if (idx < 0) return null;

            const x = idx % current.cols;
            const y = Math.floor(idx / current.cols);

            const {cx, cy} = getOverscanCenter();
            const dx = sign01(x - cx);
            const dy = sign01(y - cy);

            if (dx === 0 && dy === 0) return null;
            return {dx, dy};
        }

        function stepUrlFromDir(dir) {
            if (!dir) return '';

            const {cx, cy} = getOverscanCenter();
            const x = cx + (dir.dx || 0);
            const y = cy + (dir.dy || 0);

            if (x < 0 || x >= current.cols || y < 0 || y >= current.rows) return '';

            const idx = y * current.cols + x;
            const cell = activeGrid.children[idx];
            if (!cell) return '';

            const a = cell.querySelector('a');
            if (!a) return '';

            return String(a.dataset.stepUrl || '').replace(/&amp;/g, '&');
        }

        function enqueueDir(dir) {
            pendingDir = dir;
        }

        function flushPendingDir() {
            if (!pendingDir) return false;
            const d = pendingDir;
            pendingDir = null;

            const u = stepUrlFromDir(d);
            if (!u) return false;

            stepToUrl(u, d, lastHardHref);
            return true;
        }

        function iconSrc(data) {
            if (!data) return '';
            const kp = Number(data.kilk_player || 0);
            const prefix = current.pcMode ? '' : '..';

            if (kp >= 5) return prefix + '/images/users.png';

            if (kp > 0 && kp < 5) {
                if (current.location >= 100 && current.location < 200) {
                    return prefix + '/images/user_m' + kp + '_w0.png';
                }
                return prefix + '/images/user_m' + Number(data.man || 0) + '_w' + Number(data.woman || 0) + '.png';
            }
            return '';
        }

        function centerOverlayFromData() {
            const room = Number(current.room);
            for (let i = 0; i < lastGrid.length; i++) {
                const c = lastGrid[i];
                if (Number(c.room) === room) {
                    if (c && c.overlay && c.overlay.src) {
                        return {src: c.overlay.src || '', alt: c.overlay.alt || ''};
                    }
                    return null;
                }
            }
            return null;
        }

        function renderCenterHud(players) {
            if (hudIcon) {
                const p = players && players[String(current.room)] ? players[String(current.room)] : null;
                const src = iconSrc(p);
                if (!src) {
                    hudIcon.style.display = 'none';
                    hudIcon.src = '';
                } else {
                    hudIcon.src = src;
                    hudIcon.style.display = '';
                }
            }

            if (hudOverlay) {
                const ov = centerOverlayFromData();
                if (!ov || !ov.src) {
                    hudOverlay.style.display = 'none';
                    hudOverlay.src = '';
                    hudOverlay.alt = '';
                } else {
                    hudOverlay.src = ov.src;
                    hudOverlay.alt = ov.alt || '';
                    hudOverlay.style.display = '';
                }
            }
        }

        function renderCenterHudDuringAnim() {
            if (hudIcon) {
                hudIcon.src = SELF_ICON;
                hudIcon.style.display = '';
            }
            if (hudOverlay) {
                hudOverlay.style.display = 'none';
                hudOverlay.src = '';
                hudOverlay.alt = '';
            }
        }

        function renderGridInto(container, grid, players) {
            container.innerHTML = '';

            for (let i = 0; i < grid.length; i++) {
                const c = grid[i];

                const cell = document.createElement('div');
                cell.className = 'map-cell';
                cell.dataset.room = c.room;
                cell.dataset.step = c.stepRoom;
                cell.style.backgroundImage = "url('" + String(c.img).replace(/'/g, "\\'") + "')";

                if (!c.isCenter && c.href) {
                    const a = document.createElement('a');
                    a.href = String(c.href || '').replace(/&amp;/g, '&');
                    a.dataset.stepUrl = String(c.stepUrl).replace(/&amp;/g, '&');
                    a.dataset.room = c.room;
                    a.dataset.step = c.stepRoom;
                    a.style.display = 'block';
                    a.style.width = '100%';
                    a.style.height = '100%';
                    cell.appendChild(a);
                }

                const p = players && players[String(c.room)] ? players[String(c.room)] : null;
                const src = (!c.isCenter) ? iconSrc(p) : '';
                if (src) {
                    const img = document.createElement('img');
                    img.className = 'player-icon';
                    img.src = src;
                    img.alt = '';
                    cell.appendChild(img);
                }

                if (!c.isCenter && c.overlay && c.overlay.src) {
                    const o = document.createElement('img');
                    o.className = 'cell-overlay';
                    o.src = c.overlay.src;
                    o.alt = c.overlay.alt || '';
                    cell.appendChild(o);
                }

                container.appendChild(cell);
            }
        }

        function shouldSkipPollRender() {
            return stepping || (viewport && viewport.classList.contains('animating'));
        }

        function renderPlayersOnActive(players) {
            activeGrid.querySelectorAll('.map-cell').forEach(c => {
                Array.from(c.querySelectorAll('img.player-icon')).forEach(img => img.remove());
            });

            for (const roomStr in players) {
                const roomNum = Number(roomStr);
                if (roomNum === Number(current.room)) continue;

                const cell = activeGrid.querySelector('.map-cell[data-room="' + roomNum + '"]');
                if (!cell) continue;

                const src = iconSrc(players[roomStr]);
                if (!src) continue;

                const img = document.createElement('img');
                img.className = 'player-icon';
                img.src = src;
                img.alt = '';

                const overlay = cell.querySelector('img.cell-overlay');
                if (overlay) cell.insertBefore(img, overlay);
                else cell.appendChild(img);
            }
        }

        async function stepToUrl(stepUrl, dirIntent, hardHref) {
            if (!stepUrl) return;

            if (stepping) {
                if (dirIntent) enqueueDir(dirIntent);
                return;
            }
            stepping = true;

            let json;
            const started = Date.now();

            try {
                const url = String(stepUrl).replace(/&amp;/g, '&');
                const {res, text} = await fetchTextTimeout(url, 1500);

                if (!res.ok) {
                    jslog('step_http', Date.now() - started, res.status, 'HTTP not ok', {head: text.slice(0, 200)});
                    stepping = false;
                    if (hardHref) window.location.href = hardHref;
                    flushPendingDir();
                    return;
                }

                try {
                    json = JSON.parse(text);
                } catch (e) {
                    jslog('step_nonjson', Date.now() - started, res.status, 'Non-JSON', {head: text.slice(0, 240)});
                    stepping = false;
                    if (hardHref) window.location.href = hardHref;
                    flushPendingDir();
                    return;
                }
            } catch (e) {
                const en = (e && e.name) ? String(e.name) : '';
                if (en === 'AbortError') {
                    jslog('step_timeout', Date.now() - started, 0, 'AbortError');
                } else {
                    jslog('step_fail', Date.now() - started, 0, String(e && e.message ? e.message : e));
                }
                stepping = false;
                if (hardHref) window.location.href = hardHref;
                flushPendingDir();
                return;
            }

            if (!json || !json.ok) {
                if (json && json.redirect) {
                    window.location.href = String(json.redirect).replace(/&amp;/g, '&');
                    return;
                }
                stepping = false;
                if (hardHref) window.location.href = hardHref;
                flushPendingDir();
                return;
            }

            const applyAfterStep = () => {
                current.location = Number(json.location);
                current.room = Number(json.room);
                current.rowCount = Number(json.rowCount);

                if (json.grid) lastGrid = json.grid;

                if (!current.pcMode && typeof json.realUrl === 'string' && json.realUrl) {
                    try {
                        history.replaceState(null, '', String(json.realUrl).replace(/&amp;/g, '&'));
                    } catch (e) {
                    }
                }

                // header html
                if (headerContainer && typeof json.headerHtml === 'string') {
                    headerContainer.innerHTML = json.headerHtml;
                    runInlineScripts(headerContainer);
                }

                // below html
                if (typeof json.belowHtml === 'string') {
                    belowWrap.innerHTML = json.belowHtml;
                    runInlineScripts(belowWrap);
                }

                // title
                if (typeof json.pageTitle === 'string') document.title = json.pageTitle;

                // PC topbar
                if (typeof json.topbarJs === 'string') runJsString(json.topbarJs);

                // PC bars
                if (typeof json.barsJs === 'string') runJsString(json.barsJs);

                // polling interval
                if (json.pollMs && Number(json.pollMs) !== Number(current.pollMs || 0)) startPoll(Number(json.pollMs));

                // anim cfg
                if (json.anim) {
                    animCfg.enabled = !!Number(json.anim.enabled);
                    animCfg.ms = Math.max(0, Number(json.anim.ms || 0));
                }

                renderCenterHud(json.players || {});
            };

            const fromRoom = current.room;
            const toRoom = Number(json.room);
            const locChanged = Number(json.location) !== Number(current.location);

            // телепорт/переход локации без анимации шага
            if (locChanged || toRoom === fromRoom) {
                viewport && viewport.classList.remove('animating');
                stage.style.transition = 'none';

                renderGridInto(activeGrid, json.grid || [], json.players || {});
                setStageBase(true);

                applyAfterStep();
                stepping = false;
                flushPendingDir();
                return;
            }

            const {dx, dy} = computeDxDyByRooms(fromRoom, toRoom, current.rowCount);

            if (dx === 0 && dy === 0) {
                viewport && viewport.classList.remove('animating');
                stage.style.transition = 'none';

                renderGridInto(activeGrid, json.grid || [], json.players || {});
                setStageBase(true);

                applyAfterStep();
                stepping = false;
                flushPendingDir();
                return;
            }

            const wantAnim = !!animCfg.enabled && Number(animCfg.ms) > 0;

            if (!wantAnim) {
                viewport && viewport.classList.remove('animating');
                stage.style.transition = 'none';

                renderGridInto(activeGrid, json.grid || [], json.players || {});
                setStageBase(true);

                applyAfterStep();
                stepping = false;
                flushPendingDir();
                return;
            }

            viewport && viewport.classList.add('animating');
            renderCenterHudDuringAnim();

            const b = baseOffsetPx();
            const dur = Math.max(1, Number(animCfg.ms) || 180);

            stage.style.transition = 'none';
            stage.style.transform = `translate3d(${b.x}px, ${b.y}px, 0)`;
            void stage.offsetWidth;

            stage.style.transition = `transform ${dur}ms ease`;
            stage.style.transform = `translate3d(${b.x + (-dx * b.cellPx)}px, ${b.y + (-dy * b.cellPx)}px, 0)`;

            let finished = false;

            const finalize = () => {
                if (finished) return;
                finished = true;

                viewport && viewport.classList.remove('animating');

                stage.style.transition = 'none';
                renderGridInto(activeGrid, json.grid || [], json.players || {});
                setStageBase(true);

                applyAfterStep();
                stepping = false;

                flushPendingDir();
            };

            const onEnd = () => {
                stage.removeEventListener('transitionend', onEnd);
                finalize();
            };

            stage.addEventListener('transitionend', onEnd);

            setTimeout(() => {
                stage.removeEventListener('transitionend', onEnd);
                finalize();
            }, dur + 120);
        }

        // init
        renderGridInto(activeGrid, initialGrid, initialPlayers);
        renderCenterHud(initialPlayers);
        setStageBase(true);



        stage.addEventListener('click', (ev) => {
            const a = ev.target.closest('.map-cell a');
            if (!a) return;

            ev.preventDefault();

            const cell = a.closest('.map-cell');
            const dir = dirFromClickedCell(cell);
            if (!dir) return;

            if (stepping || (viewport && viewport.classList.contains('animating'))) {
                enqueueDir(dir);
                return;
            }

            const stepUrl = String(a.dataset.stepUrl || '').replace(/&amp;/g, '&');
            if (!stepUrl) return;

            const href = String(a.getAttribute('href') || '').replace(/&amp;/g, '&');
            lastHardHref = href;
            stepToUrl(stepUrl, dir, href);
        });

        startPoll(2500);
    })();
</script>
