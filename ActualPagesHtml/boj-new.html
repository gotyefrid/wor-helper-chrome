    .custom-radio {

    .custom-radio .radio-btn::after {
        content: "✔";

        top: 50%;
        left: 50%;
        font-size: 14px;
        color: #ffffff;
        transform: translate(-50%, -50%) scale(0);
        transition: transform 0.3s;
    }

    .custom-radio input[type="radio"]:checked + .radio-btn::after {

        inset: 0;
        border: 1px solid rgba(255, 255, 255, 0.4);

    .slider:before {
        position: absolute;

        border-radius: 50%;

    input:checked + .slider:before {

<script>
    $(document).ready(function () {
        $('#toggle-udartype').change(function () {
            $('#udartype').val(this.checked ? 2 : 1);
        });

        // sumka
        var $items = $('.item-image');
        var $slider = $('.slider-container');
        var $leftButton = $('.scroll-btn.left');
        var $rightButton = $('.scroll-btn.right');

        $items.on('click', function () {
            if ($(this).hasClass('selected')) {
                $(this).removeClass('selected');
                $('#selectedItemId').val(0);
            } else {
                $items.removeClass('selected');
                $(this).addClass('selected');
                $('#selectedItemId').val($(this).data('id'));
            }
        });

        $leftButton.on('click', function () {
            $slider.animate({scrollLeft: '-=220'}, 150);
        });

        $rightButton.on('click', function () {
            $slider.animate({scrollLeft: '+=220'}, 150);
        });
    });
</script>
