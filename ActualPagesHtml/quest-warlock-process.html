<div id="myModal" class="modal">

        <div id="dataContainer"></div>
    </div>
</div>

<script>
    $(document).ready(function () {
        var modal = $('#myModal');
        var modalContent = $('.modal-content');
        var closeBtn = $('.close');
        var dataContainer = $('#dataContainer');
        var loader = $('#loader');

        $(document).on('click', '.openItemModal', function () {
            var url = $(this).data('url');
            var isGame = $(this).hasClass('game-modal-btn');
            modal.show();
            dataContainer.hide();
            loader.show();

            if (isGame) {
                $('.modal-content').addClass('game-modal');
            } else {
                $('.modal-content').removeClass('game-modal');
            }

            $.ajax({
                url: url,
                cache: true,
                success: function (data) {
                    dataContainer.html(data).show();
                    loader.hide();
                }
            });
        });

        $(document).on('click', '.openStaticModal', function () {
            var content = $(this).data('content');
            var theme = ($(this).data('theme') || '').toLowerCase();

            var $modalContent = $('.modal-content');
            $modalContent.removeClass('game-modal ud-theme-default ud-theme-red ud-theme-green');
            if (theme) $modalContent.addClass('ud-theme-' + theme);

            loader.hide();
            dataContainer.html(content).show();
            modal.show();
        });

        closeBtn.click(function () {
            modal.hide();
            StopJsInModal();
            removeUdFooter();
            removeUdTheme();
        });

        $(window).click(function (event) {
            if ($(event.target).is(modal)) {
                modal.hide();
                StopJsInModal();
                removeUdFooter();
                removeUdTheme();
            }
        });

        $(document).on('click', '.openConfirmModal', function () {
            removeUdTheme();
            removeUdFooter();

            var content = $(this).data('content') || '';
            var theme = (($(this).data('theme') || 'default') + '').toLowerCase();
            var primaryText = $(this).data('primary') || 'Ок';
            var secondaryText = $(this).data('secondary') || 'Отмена';

            var hrefPrimary = $(this).data('primary-href') || '';
            var hrefSecondary = $(this).data('secondary-href') || '';

            modalContent.removeClass('game-modal');
            loader.hide();
            dataContainer.html(content).show();
            modal.show();

            applyUdTheme(theme);

            var $footer = $('<div class="ud-footer" id="udFooter"></div>');
            var $btnSecondary = $('<button type="button" class="ud-btn" id="udSecondary"></button>').text(secondaryText);
            var $btnPrimary = $('<button type="button" class="ud-btn ud-primary" id="udPrimary"></button>').text(primaryText);

            $footer.append($btnPrimary, $btnSecondary);
            modalContent.append($footer);

            $btnPrimary.on('click.ud', function () {
                if (hrefPrimary) window.location.href = hrefPrimary;
                udClose();
            });

            $btnSecondary.on('click.ud', function () {
                if (hrefSecondary) window.location.href = hrefSecondary;
                udClose();
            });
        });

        function applyUdTheme(theme) {
            var map = {'red': 'ud-theme-red', 'green': 'ud-theme-green', 'default': 'ud-theme-default'};
            modalContent.addClass(map[theme] || 'ud-theme-default');
        }

        function removeUdTheme() {
            modalContent.removeClass('ud-theme-default ud-theme-red ud-theme-green');
        }

        function removeUdFooter() {
            $('#udFooter').remove();
        }

        function udClose() {
            modal.hide();
            removeUdFooter();
            removeUdTheme();
            StopJsInModal();
        }
    });

    function StopJsInModal() {
        if (typeof gameTimer !== 'undefined' && gameTimer) {
            clearInterval(gameTimer);
        }
    }

    window.udModalOpenHtml = function (html, theme) {
        var modal = $('#myModal');
        if (!modal.length) return;

        var modalContent = modal.find('.modal-content');

        $('#udFooter').remove();
        modalContent.removeClass('game-modal ud-theme-default ud-theme-red ud-theme-green');

        theme = (theme || 'default').toLowerCase();
        modalContent.addClass('ud-theme-' + theme);

        $('#loader').hide();
        $('#dataContainer').empty().append(html).show();
        modal.show();
    };

</script>
